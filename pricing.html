<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcAI Pricing</title>
  <meta name="description" content="Simple, transparent pricing. Start free or go lifetime." />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-bar">
        <a class="logo" href="/" aria-label="VyrxAI">
          <img src="images/logo.svg" alt="VyrxAI logo" />
          <span class="logo-name">VyrxAI</span>
        </a>
        <nav class="nav-links">
          <a href="/pricing" class="btn btn-sm btn-secondary">Pricing</a>
          <a href="/start"   class="btn btn-sm btn-primary">Get Trial</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="page-illustration" aria-hidden="true">
    <img src="images/page-illustration.svg" alt="" width="1440" height="789" />
  </div>

  <main>
    <div class="container">
      <div class="inner-page">

        <div style="text-align:center;" data-aos>
          <div class="section-label" style="justify-content:center;">
            <span class="grad-label">Simple pricing</span>
          </div>
        </div>

        <h1 class="grad-text" data-aos data-aos-delay="50">Pricing</h1>

        <p class="lead" data-aos data-aos-delay="100">
          Pay once for unlimited use, or try free for 3 days.
        </p>

        <!-- Plans rendered by main.js from config.js -->
        <div class="pricing-grid" id="pricing-container" data-aos data-aos-delay="150">
          <!-- Populated by main.js -->
        </div>

        <p class="pricing-footnote" data-aos>
          All purchases are handled via Discord. Questions?
          <a id="pricing-discord-link" href="#" target="_blank" rel="noopener noreferrer">Join our server →</a>
        </p>

      </div>
    </div>
  </main>

  <div id="site-footer-inject"></div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/footer.js"></script>
</body>
</html>
